_format_version: "3.0"

services:
  - name: games-service
    url: http://games:4001
    routes:
      - name: games-routes
        paths:
          - /games
        strip_path: true
        protocols:
          - http
          - https
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
            - PATCH
          headers:
            - Accept
            - Authorization
            - Content-Type
            - Origin
            - X-Requested-With
            - X-CSRF-Token
          exposed_headers:
            - Authorization
          credentials: false
          max_age: 3600

  - name: wallets-service
    url: http://wallets:4002
    routes:
      - name: wallets-routes
        paths:
          - /wallets
        strip_path: true
        protocols:
          - http
          - https
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
            - PATCH
          headers:
            - Accept
            - Authorization
            - Content-Type
            - Origin
            - X-Requested-With
            - X-CSRF-Token
          exposed_headers:
            - Authorization
          credentials: false
          max_age: 3600
